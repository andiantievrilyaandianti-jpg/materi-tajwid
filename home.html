<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belajar Tajwid</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.25);
}
nav h2 {
    color: white;
    margin: 0;
}
nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: 600;
}

/* HERO */
.hero {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    padding: 20px;
}

.hero h1 {
    font-size: 45px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
    opacity: 0.9;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: white;
    color: #2a5298;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #ddd;
}

/* SECTION */
.section {
    background: white;
    padding: 50px 20px;
    text-align: center;
}

.section h2 {
    color: #2a5298;
}

/* FITUR */
.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
    margin-top: 30px;
}

.card {
    padding: 20px;
    border-radius: 15px;
    background: #f1f5ff;
}

/* FOOTER */
footer {
    text-align: center;
    color: white;
    padding: 20px;
}
</style>
</head>

<body>

<nav>
    <h2>📖 Tajwid</h2>
    <div>
        <a href="#">Home</a>
        <a href="website tajwid.html">Materi</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>Belajar Ilmu Tajwid</h1>
        <p>Belajar membaca Al-Qur'an dengan benar, mudah, dan lengkap</p>

      <a href="website tajwid.html" style="
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: white;
    color: #2a5298;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
">
    Mulai Belajar
</a>
    </div>
</div>

<!-- FITUR -->
<div class="section">
    <h2>Kenapa Belajar di Sini?</h2>

    <div class="features">
        <div class="card">
            <h3>📚 Materi Lengkap</h3>
            <p>Dari dasar sampai lanjutan</p>
        </div>

        <div class="card">
            <h3>🎯 Mudah Dipahami</h3>
            <p>Penjelasan sederhana + contoh</p>
        </div>

        <div class="card">
            <h3>💡 Interaktif</h3>
            <p>Belajar tanpa ribet</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Belajar Tajwid</p>
</footer>

</body>
</html>
